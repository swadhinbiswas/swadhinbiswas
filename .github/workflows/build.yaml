name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Cache LOC data
        uses: actions/cache@v4
        with:
          path: cache/*.txt
          key: ${{ runner.os }}-loc-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-loc-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Sync CRON_SECRET to database
        run: |
          cat > sync_secret.cjs << 'EOF'
          const https = require('https');

          async function updateSecret() {
            const payload = JSON.stringify({
              stats: { github_update_secret: process.env.CRON_SECRET }
            });

            const options = {
              hostname: new URL(process.env.PUBLIC_SITE_URL).hostname,
              port: 443,
              path: '/api/admin/settings',
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': payload.length,
                'Authorization': `Bearer ${process.env.ADMIN_SECRET || process.env.CRON_SECRET}`
              }
            };

            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode === 200) {
                    console.log('✅ CRON_SECRET synced');
                    resolve();
                  } else {
                    console.warn('⚠️  Sync returned:', res.statusCode);
                    resolve();
                  }
                });
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          updateSecret().catch(e => console.error('Sync attempt:', e.message));
          EOF
          node sync_secret.cjs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL || 'https://swadhin.cv' }}
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL || 'https://swadhin.cv' }}
        run: python today.py
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "swadhinbiswas.cse@gmail.com"
          git config --global user.name "Swadhin Biswas"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
